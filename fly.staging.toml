# fly.staging.toml — InterviewCraft STAGING environment on Fly.io
# Deploy: flyctl deploy --config fly.staging.toml
# Auto-deployed by GitHub Actions on push to `stage` branch

app = "interviewcraft-staging"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"
  dockerfile_target = "production"

[env]
  APP_ENV = "staging"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 150
    soft_limit = 100

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[http_service.checks]]
  interval = "10s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/health"

# Secrets (set via `flyctl secrets set KEY=value --app interviewcraft-staging`):
#   DATABASE_URL
#   REDIS_URL
#   SECRET_KEY
#   JWT_SECRET_KEY
#   ANTHROPIC_API_KEY
#   DEEPGRAM_API_KEY
#   ELEVENLABS_API_KEY
