name: Frontend CI

on:
  push:
    branches: [main, stage, dev]
    paths:
      - "frontend/**"
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main, stage, dev]
    paths:
      - "frontend/**"
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  lint-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run type-check

      - name: Unit tests (vitest)
        run: npm test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - name: Skip — no E2E tests written yet
        run: echo "E2E tests not yet implemented. Add Playwright tests and restore this job."
