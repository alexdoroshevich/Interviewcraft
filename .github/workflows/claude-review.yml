name: Claude PR Review

# Automatically reviews every PR to main using Claude.
# Also responds when someone comments "@claude" on a PR.
#
# Required GitHub secret: ANTHROPIC_API_KEY

on:
  pull_request:
    # Only review when PR is first opened or marked ready (not every push)
    # To re-trigger: comment "@claude review" on the PR
    types: [opened, ready_for_review]
    branches: [main]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    name: Claude code review
    runs-on: ubuntu-latest
    # Only run on PRs (issue_comment also fires on issues — skip those)
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude'))

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 15 turns is enough for a thorough review of any realistic PR size.
          # Do NOT lower below 10 — the reviewer hits max-turns on multi-file PRs.
          claude_args: "--model claude-sonnet-4-6 --max-turns 15"
          prompt: |
            You are a senior engineer performing a thorough code review for InterviewCraft,
            a real-time voice AI interview training app (FastAPI backend + Next.js 14 frontend).

            IMPORTANT: Work only from the PR diff provided to you. Do NOT attempt to
            read files, run shell commands, or access the filesystem — you do not have
            those permissions in this environment. All context you need is in the diff.

            ## Your review process
            1. Read the full PR diff carefully
            2. Check every category below — do not skip any
            3. Post inline comments on the exact lines with issues
            4. Give a final summary: APPROVE, REQUEST CHANGES, or COMMENT

            ## Security (block PR if found)
            - Hardcoded secrets, tokens, or API keys anywhere in code or comments
            - Missing ownership check: every DB query on user data MUST filter by `user_id = current_user.id`
            - Auth bypass: public endpoints that should be protected, or missing `CurrentUser` dependency
            - SQL injection via raw string interpolation (use SQLAlchemy ORM or parameterized queries only)
            - XSS: `dangerouslySetInnerHTML` without sanitization
            - Audio or PII written to disk (audio must stay in-memory only)
            - CORS origins set to wildcard `*` in production code

            ## Correctness (block PR if found)
            - Logic bugs, incorrect conditionals, off-by-one errors
            - Unhandled edge cases: None/null returns, empty lists, network failures
            - Async mistakes: missing `await`, fire-and-forget without error handling
            - Race conditions in state updates (especially React useState)
            - DB patterns: missing `await db.commit()`, missing `await db.refresh(obj)` after insert
            - JSONB mutations without full reassignment (SQLAlchemy won't detect in-place dict changes)

            ## Architecture & conventions (comment, may block)
            - Python: missing type hints on function parameters and return types
            - Python: `print()` or `logging.*` used instead of `structlog`
            - Python: PII, transcripts, or raw user answers in log fields
            - TypeScript: `any` types (use proper interfaces or `unknown`)
            - TypeScript: inline styles or CSS modules (Tailwind only)
            - React: `useSearchParams()` without a Suspense boundary (Next.js 14 requirement)
            - New npm packages added without justification
            - New Python packages added without version pin in `pyproject.toml`

            ## Performance (comment)
            - N+1 queries: fetching related records inside a loop instead of a JOIN or bulk query
            - Missing DB indexes on columns used in WHERE or ORDER BY clauses
            - Unnecessary LLM calls that could be cached or skipped
            - Large payloads sent over WebSocket without streaming

            ## Cost logging (block if LLM call added without it)
            - Every call to Anthropic/OpenAI/Deepgram/ElevenLabs MUST log to `usage_logs` table
            - Required fields: user_id, provider, operation, input_tokens, output_tokens, cost_usd, latency_ms

            ## Response format
            - Be direct and specific — quote the exact line or block with the issue
            - Explain WHY it is a problem and HOW to fix it (in words, no code blocks)
            - Do not flag formatting or style that ruff/eslint already enforce automatically
            - If a category is clean, say so in one line — do not pad
            - End with exactly one verdict: ✅ APPROVED, ⚠️ NEEDS CHANGES, or 💬 COMMENT ONLY
