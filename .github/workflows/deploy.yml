name: Deploy

# Triggers:
#   push to main  → production  (fly app: interviewcraft)
#   workflow_dispatch → manual deploy from GitHub UI
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "fly.toml"
  workflow_dispatch:

jobs:
  # ── Run tests before deploy ───────────────────────────────────────────────────
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: interviewcraft
          POSTGRES_PASSWORD: interviewcraft
          POSTGRES_DB: interviewcraft_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://interviewcraft:interviewcraft@localhost:5432/interviewcraft_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: test-secret-key-not-for-production
      JWT_SECRET_KEY: test-jwt-key-not-for-production
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app/

      - name: Run tests
        run: pytest -x -q -m "not integration and not nightly"

  # ── Deploy to PRODUCTION (push to main) ──────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend to production
        run: flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
