name: Deploy

# Triggers:
#   push to main  → production deploy
#   workflow_dispatch → manual deploy from GitHub UI
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — validate without deploying"
        required: false
        type: boolean
        default: false

# Prevent simultaneous deploys; queue instead of cancel to avoid partial deploys
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Run tests before deploy ───────────────────────────────────────────────────
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: interviewcraft
          POSTGRES_PASSWORD: interviewcraft
          POSTGRES_DB: interviewcraft_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://interviewcraft:interviewcraft@localhost:5432/interviewcraft_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: test-secret-key-not-for-production
      JWT_SECRET_KEY: test-jwt-key-not-for-production
      APP_ENV: test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app/

      - name: Run tests
        run: |
          pytest -x -q \
            -m "not integration and not nightly" \
            --cov=app \
            --cov-report=term-missing

      - name: Test summary
        if: always()
        run: |
          echo "## Backend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- Status: ✅ All checks passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: ❌ One or more checks failed" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Deploy to production ──────────────────────────────────────────────────────
  deploy:
    name: Deploy backend
    needs: test
    runs-on: ubuntu-latest
    if: github.event.inputs.dry_run != 'true'

    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Fly.io OIDC not yet available — FLY_API_TOKEN remains the standard
      - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # 1.5

      - name: Deploy backend
        # fly.toml lives in backend/ — must cd first so Fly uses backend/ as build context
        # --app overrides the placeholder app name in the public fly.toml
        run: cd backend && flyctl deploy --config fly.toml --app ${{ secrets.FLY_APP_NAME }} --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Results" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- Status: ✅ Deployed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: ❌ Deployment failed — check Fly.io dashboard" >> $GITHUB_STEP_SUMMARY
          fi
