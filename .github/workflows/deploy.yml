name: Deploy

# Triggers:
#   push to main  → production  (fly app: interviewcraft-api)
#   workflow_dispatch → manual deploy from GitHub UI with environment choice
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      dry_run:
        description: "Dry run — validate without deploying"
        required: false
        type: boolean
        default: false

# Prevent simultaneous deploys; queue instead of cancel to avoid partial deploys
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Run tests before deploy ───────────────────────────────────────────────────
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: interviewcraft
          POSTGRES_PASSWORD: interviewcraft
          POSTGRES_DB: interviewcraft_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://interviewcraft:interviewcraft@localhost:5432/interviewcraft_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: test-secret-key-not-for-production
      JWT_SECRET_KEY: test-jwt-key-not-for-production
      APP_ENV: test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@v5 # TODO: pin to SHA — run: gh api repos/actions/setup-python/git/refs/tags/v5 | jq .object.sha
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app/

      - name: Run tests
        run: |
          pytest -x -q \
            -m "not integration and not nightly" \
            --cov=app \
            --cov-report=term-missing

      - name: Test summary
        if: always()
        run: |
          echo "## Backend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- Status: ✅ All checks passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: ❌ One or more checks failed" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Deploy to backend (push to main or manual dispatch) ──────────────────────
  deploy:
    name: Deploy backend (${{ github.event.inputs.environment || 'production' }})
    needs: test
    runs-on: ubuntu-latest
    if: github.event.inputs.dry_run != 'true'

    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Fly.io OIDC not yet available (April 2026) — FLY_API_TOKEN remains the standard
      - uses: superfly/flyctl-actions/setup-flyctl@master # TODO: pin to SHA

      - name: Select fly config
        id: config
        run: |
          ENV="${{ github.event.inputs.environment || 'production' }}"
          if [ "$ENV" = "staging" ]; then
            echo "config=fly.staging.toml" >> $GITHUB_OUTPUT
          else
            echo "config=fly.toml" >> $GITHUB_OUTPUT
          fi

      - name: Deploy backend
        # Run from repo root so --config path resolves correctly (fly.toml / fly.staging.toml are at root)
        run: flyctl deploy --config ${{ steps.config.outputs.config }} --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy summary
        if: always()
        run: |
          ENV="${{ github.event.inputs.environment || 'production' }}"
          echo "## Deploy Results" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: \`$ENV\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- Status: ✅ Deployed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: ❌ Deployment failed — check Fly.io dashboard" >> $GITHUB_STEP_SUMMARY
          fi
