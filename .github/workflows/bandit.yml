name: Security scan (bandit)

# Bandit scans Python source for common security issues (OWASP).
# Runs on every PR that touches backend code.
# High severity + high confidence = fail the build.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    paths:
      - backend/**

jobs:
  bandit:
    name: Python security scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: PyCQA/bandit-action@67a458d90fa11fb1463e91e7f4c8f068b5863c7f # v1.0.1
        with:
          path: backend/app
          severity: medium
          confidence: medium
          # Exclude test files — they intentionally use test credentials etc.
          excluded_paths: backend/tests
