name: CodeQL security analysis

# CodeQL v4 (Node.js 24 runtime) — v3 deprecated December 2026.
# Scans Python + TypeScript for injection paths, auth bypass, tainted data flows.
# Also scans .github/workflows/ for CI/CD security issues (GA April 2025).
# Results go to GitHub Security tab (SARIF upload).
#
# April 2026 note: file coverage collection disabled on PRs by GitHub
# (performance improvement) — still computed on push/schedule runs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan — Monday 03:00 UTC
    # timezone field available from March 2026 GA
    - cron: "0 3 * * 1"
      timezone: "UTC"

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      # SHA: v4.2.2 — pin to full SHA per 2026 supply-chain security standard
      # (March 2026 Trivy incident: SHA alone doesn't verify origin — verify
      #  this repo at https://github.com/actions/checkout/releases/tag/v4.2.2)
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        # v4 required: v3 deprecated December 2026, v4 runs on Node.js 24
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality
          config: |
            paths-ignore:
              - frontend/node_modules
              - backend/.venv
              - "**/*.test.ts"
              - "**/*.spec.ts"
              - backend/tests

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
