name: PR title validation

# Validates that the PR title itself follows Conventional Commits format.
# This is separate from commit-message-check — it ensures the squash-merge
# commit (which uses the PR title) also follows the convention.

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read
  statuses: write

jobs:
  validate-pr-title:
    name: Conventional commit PR title
    runs-on: ubuntu-latest

    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            ci
            chore
            build
            test
            refactor
            perf
            revert
            style
          requireScope: false
          # Subject must not start with uppercase (e.g. "feat: Add" → bad, "feat: add" → good)
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" in PR title "{title}" must start with a lowercase letter.
            Example: feat: add google oauth button
          wip: true
