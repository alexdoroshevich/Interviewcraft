name: Conventional commit message check

# Validates that every commit in the PR follows conventional commits format.
# Pattern matches: feat|fix|chore|docs|style|ci|refactor|perf|test|build|revert
# Also allows merge commits (Merge branch / Merge remote).

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  check-commit-message:
    name: Validate commit messages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check conventional commit format
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          PATTERN='^(feat|fix|chore|docs|style|ci|refactor|perf|test|build|revert)(\([\w/-]+\))?!?:\s.+$|^(Merge\s(branch|remote|pull))'
          FAILED=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qP "$PATTERN"; then
              echo "❌ Bad commit message: $msg"
              echo "   Expected format: feat: description  |  fix(auth): token expiry"
              FAILED=1
            fi
          done < <(git log --format=%s "${BASE}..${HEAD}")
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Allowed types: feat, fix, chore, docs, style, ci, refactor, perf, test, build, revert"
            exit 1
          fi
          echo "✅ All commit messages are valid."
