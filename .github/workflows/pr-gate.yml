name: PR Quality Gate

# Runs on every PR to main.
# ALL jobs must pass before a PR can be merged (enforced by branch protection).
# This is a fail-fast gate: if any check fails, the PR cannot be merged —
# even if the author pushes a fix — until CI re-runs and passes.

on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR — always want feedback on latest push
concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Backend: lint + type check + tests ───────────────────────────────────────
  backend-gate:
    name: Backend gate (lint + types + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: interviewcraft
          POSTGRES_PASSWORD: interviewcraft
          POSTGRES_DB: interviewcraft_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://interviewcraft:interviewcraft@localhost:5432/interviewcraft_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-gate-secret-not-for-production
      JWT_SECRET_KEY: ci-gate-jwt-not-for-production
      APP_ENV: test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Dependency audit (pip-audit) — fail on any known vulnerability
        run: |
          pip install pip-audit
          pip-audit --desc on --skip-editable

      - name: Lint (ruff) — must be clean
        run: ruff check .

      - name: Type check (mypy) — must be clean
        run: mypy app/

      - name: Unit tests — must pass (excludes integration + nightly)
        run: |
          pytest -x -q \
            -m "not integration and not nightly" \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Backend summary
        if: always()
        run: |
          echo "## Backend Gate" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Lint, types, and unit tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ One or more checks failed — see logs above" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Frontend: lint + type check + unit tests ─────────────────────────────────
  frontend-gate:
    name: Frontend gate (lint + types + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Dependency audit (npm audit) — fail on HIGH+ vulnerabilities
        run: npm audit --audit-level=high

      - name: Lint (eslint) — must be clean
        run: npm run lint

      - name: Type check (tsc) — must be clean
        run: npm run type-check

      - name: Unit tests (vitest) — must pass
        run: npm test

      - name: Frontend summary
        if: always()
        run: |
          echo "## Frontend Gate" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ ESLint, TypeScript, and vitest passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ One or more checks failed — see logs above" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Pre-commit hooks (file hygiene + secrets detection) ──────────────────────
  pre-commit-gate:
    name: Pre-commit hooks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  # ── PR metadata check ────────────────────────────────────────────────────────
  pr-metadata:
    name: PR description check
    runs-on: ubuntu-latest

    permissions:
      pull-requests: read

    steps:
      - name: Check PR has description
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const body = context.payload.pull_request.body || "";

            // Must have real content (not empty or just whitespace)
            if (body.trim().length < 200) {
              core.setFailed(
                "PR description is too short (under 200 chars). Fill in the pull request template."
              );
              return;
            }

            // Must have required section headers
            if (!body.includes("## What does this PR do?")) {
              core.setFailed("Missing section '## What does this PR do?' in PR description.");
              return;
            }
            if (!body.includes("## How to test")) {
              core.setFailed("Missing section '## How to test' in PR description.");
              return;
            }

            // Must not have unfilled placeholder comments from the template
            // Match full placeholder strings so partial matches don't false-positive
            const unfilled = [
              "<!-- One paragraph summary: what changed and why -->",
              "<!-- Steps for the reviewer to verify the change works -->",
            ];
            for (const placeholder of unfilled) {
              if (body.includes(placeholder)) {
                core.setFailed(
                  `PR description still has an unfilled placeholder: "${placeholder}". ` +
                  "Replace it with actual content."
                );
                return;
              }
            }

  # ── Summary gate: all must pass ──────────────────────────────────────────────
  # This job is what branch protection requires. It only succeeds if all
  # upstream jobs succeed, giving a single required status check to configure.
  all-gates-passed:
    name: All gates passed
    runs-on: ubuntu-latest
    needs: [backend-gate, frontend-gate, pre-commit-gate, pr-metadata]
    if: always()

    steps:
      - name: Check all gates
        run: |
          if [[ "${{ needs.backend-gate.result }}" != "success" ]]; then
            echo "❌ Backend gate failed"; exit 1
          fi
          if [[ "${{ needs.frontend-gate.result }}" != "success" ]]; then
            echo "❌ Frontend gate failed"; exit 1
          fi
          if [[ "${{ needs.pre-commit-gate.result }}" != "success" ]]; then
            echo "❌ Pre-commit gate failed"; exit 1
          fi
          if [[ "${{ needs.pr-metadata.result }}" != "success" ]]; then
            echo "❌ PR metadata check failed"; exit 1
          fi
          echo "✅ All gates passed — PR is ready to merge"

      - name: Gate summary
        if: always()
        run: |
          echo "## PR Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-commit | ${{ needs.pre-commit-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PR Metadata | ${{ needs.pr-metadata.result }} |" >> $GITHUB_STEP_SUMMARY
