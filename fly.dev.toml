# fly.dev.toml — InterviewCraft DEV environment on Fly.io
# Deploy: flyctl deploy --config fly.dev.toml
# Auto-deployed by GitHub Actions on push to `dev` branch

app = "interviewcraft-dev"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"
  dockerfile_target = "production"

[env]
  APP_ENV = "development"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/health"

# Secrets (set via `flyctl secrets set KEY=value --app interviewcraft-dev`):
#   DATABASE_URL
#   REDIS_URL
#   SECRET_KEY
#   JWT_SECRET_KEY
#   ANTHROPIC_API_KEY
#   DEEPGRAM_API_KEY
#   ELEVENLABS_API_KEY
